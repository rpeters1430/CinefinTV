name: Update Version JSON

on:
  release:
    types: [published]

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version info from build.gradle.kts
        id: version_info
        run: |
          # Extract versionCode (e.g., 2)
          VERSION_CODE=$(grep "versionCode =" app/build.gradle.kts | awk '{print $3}')
          # Extract versionName (e.g., "1.0.1")
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Update version.json
        run: |
          mkdir -p updates
          # We use jq to safely handle the release body text (escaping quotes/newlines)
          RELEASE_NOTES=$(echo "${{ github.event.release.body }}" | jq -R -s .)
          
          cat <<EOF > updates/version.json
          {
            "versionCode": ${{ env.VERSION_CODE }},
            "versionName": "${{ env.VERSION_NAME }}",
            "updateUrl": "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/app-release.apk",
            "releaseNotes": $RELEASE_NOTES,
            "isCritical": false
          }
          EOF

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add updates/version.json
          git commit -m "chore: auto-update version.json for ${{ github.event.release.tag_name }}"
          git push origin main
